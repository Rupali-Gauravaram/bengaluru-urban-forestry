name: Build & Publish Docker image

# Build the image on every push/PR to main, and publish it to the GitHub
# Container Registry (GHCR) on pushes to main and tagged releases.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed to push to GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # BuildKit + caching backend for fast CI builds.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Only log in when we actually intend to push (not on PRs from forks).
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derive image tags/labels from git metadata (branch, sha, semver tags).
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          # Push only when not a PR; PRs build-only to validate the Dockerfile.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions layer cache — keeps CI builds fast across runs.
          cache-from: type=gha
          cache-to: type=gha,mode=max
